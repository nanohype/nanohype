# __CAMPAIGN_NAME__ — Messaging Matrix
# Project: __PROJECT_NAME__
# Channel: __CHANNEL__

core_value_proposition: >
  One sentence that communicates the primary value of the product or campaign
  to the target audience in their language.

segments:
  - name: "Operations Manager"
    pain_point: "Spending hours on manual data reconciliation across disconnected tools"
    desired_outcome: "Automated, accurate reconciliation that frees time for strategic work"
    messages:
      primary: "Stop reconciling spreadsheets. Start making decisions."
      supporting:
        - hook: "Manual reconciliation costs your team 8 hours per week"
          proof: "Customers report 85% reduction in reconciliation time"
          cta: "See how it works"
        - hook: "Errors in reports undermine trust in your data"
          proof: "Built-in validation catches discrepancies before they reach stakeholders"
          cta: "Try the accuracy guarantee"
    channels:
      - channel: email
        tone: "Direct, problem-aware"
        subject_line: "Your team is spending 8 hours/week on something that takes 15 minutes"
      - channel: linkedin
        tone: "Professional, peer-to-peer"
        hook: "Ask your ops team how long reconciliation takes. The answer will surprise you."
      - channel: search
        tone: "Solution-oriented"
        headline: "Automated Data Reconciliation for Operations Teams"

  - name: "VP of Engineering"
    pain_point: "Engineering time wasted on data pipeline maintenance and manual fixes"
    desired_outcome: "Reliable data infrastructure that reduces operational burden"
    messages:
      primary: "Give your engineers back the hours they spend fixing data."
      supporting:
        - hook: "Data pipeline issues are the #1 source of unplanned engineering work"
          proof: "Teams using automated reconciliation reduce data-related incidents by 70%"
          cta: "Calculate your savings"
        - hook: "Your best engineers shouldn't be debugging CSV imports"
          proof: "Self-healing reconciliation means fewer 2 AM pages"
          cta: "See the architecture"
    channels:
      - channel: email
        tone: "Technical, ROI-focused"
        subject_line: "How much engineering time are you losing to data fixes?"
      - channel: linkedin
        tone: "Thought leadership"
        hook: "The hidden cost of manual data reconciliation isn't the time — it's the talent attrition."
      - channel: search
        tone: "Technical, solution-oriented"
        headline: "Eliminate Manual Data Reconciliation — Engineering-Grade Automation"

objection_responses:
  - objection: "We already have a process that works"
    response: "If it works, it should be fast and error-free. Most teams discover 10-15% of manual reconciliations contain errors."
    proof: "Internal audit data from 50+ customer implementations"

  - objection: "This seems like a nice-to-have"
    response: "Calculate the fully-loaded cost of the hours your team spends on reconciliation monthly. Most teams find it's 5-10x the cost of automation."
    proof: "ROI calculator and customer case studies"

  - objection: "We need to evaluate other options first"
    response: "We encourage comparison. Here's how we stack up on the criteria that matter most to operations teams."
    proof: "Competitive comparison sheet and G2 reviews"
