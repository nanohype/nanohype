# __PROJECT_NAME__ — Pricing
# Client: __COMPANY_NAME__
# Proposal type: __PROPOSAL_TYPE__

currency: USD
valid_through: "YYYY-MM-DD"

pricing_model: "fixed_price"

phases:
  - name: "Discovery"
    duration: "2 weeks"
    line_items:
      - description: "Stakeholder interviews and workflow mapping"
        quantity: 1
        unit: "fixed"
        unit_price: 8000
        total: 8000
      - description: "Technical environment assessment"
        quantity: 1
        unit: "fixed"
        unit_price: 4000
        total: 4000
    subtotal: 12000

  - name: "Design"
    duration: "2 weeks"
    line_items:
      - description: "Solution architecture and data model design"
        quantity: 1
        unit: "fixed"
        unit_price: 10000
        total: 10000
      - description: "UX wireframes and design review"
        quantity: 1
        unit: "fixed"
        unit_price: 5000
        total: 5000
    subtotal: 15000

  - name: "Build"
    duration: "6 weeks"
    line_items:
      - description: "Core system implementation"
        quantity: 1
        unit: "fixed"
        unit_price: 36000
        total: 36000
      - description: "Integration development"
        quantity: 1
        unit: "fixed"
        unit_price: 12000
        total: 12000
      - description: "Testing and quality assurance"
        quantity: 1
        unit: "fixed"
        unit_price: 8000
        total: 8000
    subtotal: 56000

  - name: "Launch"
    duration: "2 weeks"
    line_items:
      - description: "Production deployment and migration"
        quantity: 1
        unit: "fixed"
        unit_price: 6000
        total: 6000
      - description: "Training sessions (2x half-day)"
        quantity: 2
        unit: "session"
        unit_price: 3000
        total: 6000
      - description: "Documentation and handoff"
        quantity: 1
        unit: "fixed"
        unit_price: 4000
        total: 4000
    subtotal: 16000

summary:
  subtotal: 99000
  discount:
    type: null
    amount: 0
    reason: null
  total: 99000

payment_schedule:
  - milestone: "Contract signed"
    percentage: 25
    amount: 24750
    due: "Upon signing"
  - milestone: "Discovery complete"
    percentage: 25
    amount: 24750
    due: "End of week 2"
  - milestone: "Build complete"
    percentage: 25
    amount: 24750
    due: "End of week 10"
  - milestone: "Launch complete"
    percentage: 25
    amount: 24750
    due: "End of week 12"

expenses:
  included:
    - "All remote collaboration tools"
    - "Development and testing infrastructure"
  excluded:
    - "Client production hosting and infrastructure"
    - "Third-party SaaS licenses required by client"
    - "Travel expenses (billed at cost if required)"

optional_addons:
  - name: "Post-launch support (4 weeks)"
    description: "Dedicated support channel, bug fixes, and minor adjustments"
    price: 12000
  - name: "Extended training"
    description: "Additional training sessions for new team members"
    price: 3000
    unit: "per session"
  - name: "Ongoing advisory"
    description: "Monthly advisory call and roadmap consultation"
    price: 4000
    unit: "per month"
