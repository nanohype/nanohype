    - name: "Competitor C"
      wins: 0
      losses: 0
      win_rate: null

  top_win_themes:
    - theme: "Time to value"
      frequency: 1
      description: "Fast POC and deployment resonates with frustrated buyers"
    - theme: "Pricing transparency"
      frequency: 1
      description: "Public pricing builds trust in the evaluation process"

  top_loss_themes:
    - theme: "No champion identified"
      frequency: 1
      description: "Committee decisions without an internal advocate favor competitors with stronger brand"
    - theme: "UX perception"
      frequency: 1
      description: "Non-technical decision makers weight visual polish heavily"

  recommended_actions:
