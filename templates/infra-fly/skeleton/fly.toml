app = "__APP_NAME__"
primary_region = "__REGION__"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "__MACHINE_SIZE__"

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/healthz"
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
