apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "__PROJECT_NAME__.componentName" (list "historical" .) }}-conf
  labels:
    {{- include "__PROJECT_NAME__.componentLabels" (list "historical" .) | nindent 4 }}
data:
  "jvm.config": |
    {{- .Values.historical.jvm | nindent 4 }}
  "runtime.properties": |
    {{- .Values.historical.runtime | nindent 4 }}
