# Base values for __APP_NAME__. Per-environment deltas live in values-{dev,staging,production}.yaml.

image:
  repository: __IMAGE__
  tag: ""           # pinned per-environment in values-{env}.yaml
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: __PORT__
  targetPort: __PORT__

serviceAccount:
  create: true
  # Pinned to the app name so it matches the `service_account` of the EKS Pod
  # Identity association that landing-zone's __APP_NAME__-platform component
  # creates — that association binds this ServiceAccount to its IAM role, so the
  # pod needs no role-arn annotation and the chart carries no AWS account values.
  name: __APP_NAME__
  # Extra annotations merged onto the ServiceAccount.
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

probes:
  liveness:
    httpGet:
      path: /healthz
      port: __PORT__
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    httpGet:
      path: /readyz
      port: __PORT__
    initialDelaySeconds: 5
    periodSeconds: 10

# Default-deny + ingress/egress allow-lists. Add entries per the app's actual needs.
# (Ingress varies by workload topology — single-pod vs api+web vs webhook+processor —
# so the base chart takes it from here rather than hardcoding it.)
networkPolicy:
  enabled: true
  ingress:
    # Allow traffic from same namespace + the cluster ingress controller.
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: __PORT__
  egress:
    # DNS to kube-system CoreDNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # HTTPS egress to the internet (Bedrock, GitHub, etc.)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16   # link-local / IMDS — must NOT be reachable from pods
      ports:
        - protocol: TCP
          port: 443

# Secret material via External Secrets Operator (the eks-gitops external-secrets
# addon provisions the `aws-secrets-manager` ClusterSecretStore). Off by default —
# enable once the app has secrets at <app>/<env>/app-secrets in AWS Secrets
# Manager. The ExternalSecret extracts every property into a k8s Secret the
# Deployment mounts via envFrom. Never put secret values in chart values.
externalSecret:
  enabled: false
  secretStore: aws-secrets-manager
  refreshInterval: 1h
  remoteRefSecret: __APP_NAME__/dev/app-secrets   # override per-env in values-{env}.yaml

# PrometheusRule (kube-prometheus-stack → Mimir). Per the observability-slo
# standard it renders SLI recording rules + multi-window multi-burn-rate
# error-budget alerts keyed on `__APP_NAME___requests_total` /
# `__APP_NAME___errors_total`. Supply latency or custom-shaped SLOs via `groups`
# (set it to a non-empty list and it is emitted verbatim instead of the SLO default).
prometheusRule:
  enabled: true
  selector:
    release: kube-prometheus-stack
  groups: []

# SLO / error-budget config (observability-slo standard). Drives the burn-rate
# alerts in the PrometheusRule. The default availability SLI is
# `1 - errors_total/requests_total`; override the ratio with `errorRatioQuery` if
# the app's good/valid events are shaped differently.
slo:
  objective: 0.999        # 99.9% availability over 30d
  errorRatioQuery: ""     # optional PromQL override of the error-ratio (per-window [$window] interpolated by the app)

# Grafana dashboard, shipped as a GrafanaDashboard CR the grafana-operator
# reconciles onto the external Amazon Managed Grafana (the same path the platform
# dashboards use). On by default — the SRE-grade board lives in
# chart/dashboards/__APP_NAME__.json (golden-signal rows + SLO/error-budget row),
# self-contained so it renders against AMP with no recording-rule ruler.
grafanaDashboard:
  enabled: true
  instanceSelector:
    dashboards: external
  allowCrossNamespaceImport: true
  resyncPeriod: 24h

# ServiceMonitor (Prometheus scrape). Off by default — the baseline pushes metrics
# via OTLP to the cluster collector (the standard's "equivalent scrape config").
# Enable only for apps that instead expose a Prometheus /metrics endpoint to be
# scraped, and add a named `metrics` port to the Service.
serviceMonitor:
  enabled: false
  port: metrics
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s
  selector:
    release: kube-prometheus-stack

# OTel resource attrs propagate through traces/logs/metrics. The cluster-level
# OTel Collector tags downstream exporters using these.
otel:
  enabled: true
  resourceAttributes:
    agents.tenant: __TENANT__
    agents.platform: __APP_NAME__

# Resource-tagging governance labels (the resource-tagging standard). Merged onto
# every resource's metadata + pod labels by tenant-chart-base.labels, under the
# reserved k8s prefixes. environment is set per-env in values-{env}.yaml; add
# platform.nanohype.dev/cost-center / .../owner here if you want them in-cluster.
commonLabels:
  platform.nanohype.dev/team: __TENANT__
  app.kubernetes.io/component: __PERSONA__

nodeSelector: {}
tolerations: []
affinity: {}
