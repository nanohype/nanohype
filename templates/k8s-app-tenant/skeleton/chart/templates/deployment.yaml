apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tenant-chart-base.fullname" . }}
  labels:
    {{- include "tenant-chart-base.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "tenant-chart-base.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tenant-chart-base.labels" . | nindent 8 }}
      annotations:
        {{- range $k, $v := .Values.otel.resourceAttributes }}
        resource.opentelemetry.io/{{ $k }}: {{ $v | quote }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "tenant-chart-base.serviceAccountName" . }}
      # Headroom for SIGTERM-driven graceful shutdown (drain in-flight work, flush
      # OTel). Bump for slow drains (e.g. queue consumers). A preStop sleep can be
      # added here if the app needs endpoint-deregistration lag before SIGTERM.
      terminationGracePeriodSeconds: 30
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            {{- range $k, $v := .Values.otel.resourceAttributes }}
            - name: OTEL_RESOURCE_ATTRIBUTES_{{ $k | upper | replace "." "_" | replace "-" "_" }}
              value: {{ $v | quote }}
            {{- end }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.observability.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
          {{- if .Values.externalSecret.enabled }}
          envFrom:
            - secretRef:
                name: {{ include "tenant-chart-base.fullname" . }}-secrets
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
