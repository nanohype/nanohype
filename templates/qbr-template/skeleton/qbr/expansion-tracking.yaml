  - id: "EXP-002"
    type: upsell
    title: "Upgrade to Enterprise tier"
    description: >
      Customer is approaching the usage limits of their current plan
      and has started requesting Enterprise-only features (SSO, audit
      logs, custom roles). Natural upgrade path as organization grows.
    status: discovery
    probability: 40
    estimated_arr_increase: 30000
    target_close_date: "YYYY-MM-DD"
    champion: "Operations Manager"
    decision_maker: "CFO"
    blockers:
      - "Budget approval cycle aligns with fiscal year"
      - "CFO needs ROI justification"
    next_steps:
      - action: "Prepare ROI analysis with customer's actual usage data"
        owner: "CSM"
        due_date: "YYYY-MM-DD"
      - action: "Schedule demo of Enterprise features with champion"
        owner: "CSM"
        due_date: "YYYY-MM-DD"
    signals:
      - date: "YYYY-MM-DD"
        signal: "Customer hit 80% of usage quota"
      - date: "YYYY-MM-DD"
        signal: "Asked about SSO integration in check-in call"

  - id: "EXP-003"
    type: cross_sell
    title: "Add analytics module"
    description: >
      Customer has been exporting data to their own BI tool for
      analysis. The analytics module would give them built-in
      dashboards and eliminate the export workflow.
    status: awareness
    probability: 20
    estimated_arr_increase: 12000
    target_close_date: "YYYY-MM-DD"
    champion: "Data Analyst"
    decision_maker: "Operations Manager"
    blockers:
      - "Customer unaware of analytics module capabilities"
      - "Existing BI tool contract runs through end of year"
    next_steps:
      - action: "Share analytics module overview in next check-in"
        owner: "CSM"
        due_date: "YYYY-MM-DD"
      - action: "Offer free trial of analytics module"
        owner: "CSM"
        due_date: "YYYY-MM-DD"
    signals:
      - date: "YYYY-MM-DD"
        signal: "Customer asked about API export rate limits"
      - date: "YYYY-MM-DD"
        signal: "Analyst mentioned spending 3 hours/week on data exports"

