pipeline:
  - id: "EXP-001"
    type: seat_expansion
    title: "European team rollout"
    description: >
      Customer's European operations team (15 people) has expressed
      interest in adopting the product after seeing results from the
      US team. Pending a specific integration that is on the product
      roadmap.
    status: qualified
    probability: 60
    estimated_arr_increase: 22500
    target_close_date: "YYYY-MM-DD"
    champion: "European Ops Director"
    decision_maker: "VP of Global Operations"
    blockers:
      - "Integration with European ERP system not yet available"
      - "Data residency requirements need validation"
    next_steps:
      - action: "Share product roadmap timeline for ERP integration"
        owner: "CSM"
        due_date: "YYYY-MM-DD"
