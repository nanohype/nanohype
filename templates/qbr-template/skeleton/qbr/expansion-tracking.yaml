    probability_range: [20, 40]
  - name: qualified
    description: "Need confirmed, budget identified, timeline discussed"
    probability_range: [40, 70]
  - name: proposal
    description: "Pricing shared, decision pending"
    probability_range: [70, 90]
  - name: closed_won
    description: "Deal signed"
    probability_range: [100, 100]
  - name: closed_lost
    description: "Opportunity did not convert"
    probability_range: [0, 0]

