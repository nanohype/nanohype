<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>__EXTENSION_NAME__</title>
    <style>
      :root {
        --background: #08090D;
        --foreground: #E8E9ED;
        --card: #0F1015;
        --border: rgba(148, 163, 224, 0.08);
        --input: #13141A;
        --input-border: rgba(148, 163, 224, 0.10);
        --hover: rgba(148, 163, 224, 0.05);
        --muted: #161821;
        --muted-foreground: #787D8E;
        --dim: #4D5266;
        --accent: #34D399;
        --accent-foreground: #022C22;
        --success: #2DA44E;
        --warning: #D4A72C;
        --danger: #CF222E;
        --ease-spring: cubic-bezier(0.32, 0.72, 0, 1);
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 13px;
        letter-spacing: -0.015em;
        background: var(--background);
        color: var(--foreground);
      }
      #root {
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
