namespace: monitoring

grafana:
  image:
    repository: grafana/grafana
    tag: "11.4.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  adminUser: admin
  adminPassword: admin
  env:
    GF_USERS_ALLOW_SIGN_UP: "false"
    GF_LOG_LEVEL: "warn"

prometheus:
  image:
    repository: prom/prometheus
    tag: "v2.54.1"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9090
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  retention: 15d
  storage:
    size: 10Gi

loki:
  image:
    repository: grafana/loki
    tag: "3.3.2"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3100
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    size: 10Gi
