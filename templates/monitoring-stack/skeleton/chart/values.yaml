namespace: monitoring

grafana:
  image:
    repository: grafana/grafana
    tag: "13.0.1"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  adminUser: admin
  # REQUIRED: Set a strong password. Do not use the default in production.
  # Override via: helm install --set grafana.adminPassword=<password>
  adminPassword: ""
  env:
    GF_USERS_ALLOW_SIGN_UP: "false"
    GF_LOG_LEVEL: "warn"

prometheus:
  image:
    repository: prom/prometheus
    tag: "v3.11.3"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9090
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  retention: 15d
  storage:
    size: 10Gi

loki:
  image:
    repository: grafana/loki
    tag: "3.7.2"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3100
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    size: 10Gi
