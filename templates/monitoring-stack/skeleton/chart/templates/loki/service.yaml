apiVersion: v1
kind: Service
metadata:
  name: {{ include "__PROJECT_NAME__.fullname" . }}-loki
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "__PROJECT_NAME__.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
spec:
  type: {{ .Values.loki.service.type }}
  ports:
    - port: {{ .Values.loki.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "__PROJECT_NAME__.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: loki
