apiVersion: v1
kind: Service
metadata:
  name: {{ include "__PROJECT_NAME__.fullname" . }}-grafana
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "__PROJECT_NAME__.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: {{ .Values.grafana.service.type }}
  ports:
    - port: {{ .Values.grafana.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "__PROJECT_NAME__.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
