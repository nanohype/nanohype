global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          instance: "prometheus"

  # Node exporter -- uncomment when node-exporter is running
  # - job_name: "node-exporter"
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
  #       labels:
  #         instance: "node"

  # Application targets -- add your services here
  # - job_name: "__PROJECT_NAME__"
  #   metrics_path: "/metrics"
  #   static_configs:
  #     - targets: ["host.docker.internal:8080"]
  #       labels:
  #         service: "__PROJECT_NAME__"
  #         environment: "development"
