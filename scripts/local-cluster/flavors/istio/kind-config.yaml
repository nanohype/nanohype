# kind cluster config for the istio flavor.
#
# Single control-plane node. Port-forwards expose 80/443 from the
# Istio ingress gateway to the host so external demos can curl
# http://localhost directly. Adjust if those ports conflict locally.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: nanohype-istio
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8081
        protocol: TCP
      - containerPort: 30443
        hostPort: 8443
        protocol: TCP
