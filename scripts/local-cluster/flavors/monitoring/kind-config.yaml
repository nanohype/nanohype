# kind cluster config for the monitoring flavor.
#
# Single control-plane node sized for a kube-prometheus-style stack.
# Port mappings expose Grafana (3000) and Prometheus (9090) directly
# when a NodePort or LoadBalancer Service is configured in the
# monitoring-stack Helm chart's output.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: nanohype-monitoring
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
      - containerPort: 30300
        hostPort: 3000
        protocol: TCP
      - containerPort: 30310
        hostPort: 3100
        protocol: TCP
