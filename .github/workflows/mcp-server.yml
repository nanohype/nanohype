name: MCP Server

on:
  push:
    branches: [main]
    paths: ['mcp-server/**', 'sdk/**', 'schemas/**']
  pull_request:
    paths: ['mcp-server/**', 'sdk/**', 'schemas/**']

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test MCP server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            sdk/package-lock.json
            mcp-server/package-lock.json

      # The MCP server depends on @nanohype/sdk via file:../sdk, so the sibling
      # package must be installed and built before the MCP package resolves it.
      - name: Build the linked SDK
        working-directory: sdk
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Audit dependencies
        working-directory: mcp-server
        run: npm audit --audit-level=high --omit=dev

      - name: Typecheck
        working-directory: mcp-server
        run: npm run typecheck

      - name: Build
        working-directory: mcp-server
        run: npm run build

      - name: Test
        working-directory: mcp-server
        run: npm test
