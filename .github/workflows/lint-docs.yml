name: Lint Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "*.md"
  pull_request:
    paths:
      - "docs/**"
      - "*.md"

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            docs/**/*.md
            *.md
        continue-on-error: true
