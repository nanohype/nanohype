name: Template Doctor

on:
  # Weekly cron — Sunday 06:00 UTC. Full catalog runs take a while; the
  # weekly cadence matches how fast the ecosystem drifts in practice.
  schedule:
    - cron: '0 6 * * 0'
  # Gate PRs that touch templates, composites, or the doctor itself: fail on
  # hard errors so typecheck/build/lint/ref debt can't land silently. Advisory
  # findings (outdated deps, dead deps) are reported but don't block.
  pull_request:
    paths:
      - 'templates/**'
      - 'composites/**'
      - 'scripts/template-doctor/**'
      - '.github/workflows/template-doctor.yml'
  # Manual trigger for on-demand runs (e.g., before cutting a release).
  workflow_dispatch:
    inputs:
      only:
        description: 'Limit to specific check groups (comma-separated: ts,go,java,python,cross)'
        required: false
        default: 'ts,go,java,python,cross'

jobs:
  doctor:
    name: Run template doctor
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # go-service's pgx/otel deps require go 1.25; keep the doctor on a
          # current toolchain so it validates skeletons against what they build on.
          go-version: '1.26'

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run doctor
        id: doctor
        env:
          ONLY: ${{ github.event.inputs.only || 'ts,go,java,python,cross' }}
          # Gate pull requests on hard errors; cron / manual runs stay report-only.
          FAIL_ON: ${{ github.event_name == 'pull_request' && 'error' || '' }}
        run: |
          args=(--only "$ONLY" --format markdown)
          [ -n "$FAIL_ON" ] && args+=(--fail-on "$FAIL_ON")
          ./scripts/template-doctor/run.sh "${args[@]}" > doctor-report.md

      - name: Post report to job summary
        if: always()
        run: cat doctor-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: doctor-report
          path: doctor-report.md
          retention-days: 30

      - name: Open or update tracking issue (cron runs only)
        if: github.event_name == 'schedule'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("doctor-report.md", "utf8");
            const title = "Template Doctor — weekly catalog health report";

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "template-doctor",
              per_page: 10,
            });

            if (existing.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
              core.info(`Updated existing issue #${existing[0].number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["template-doctor", "maintenance"],
              });
              core.info("Opened new tracking issue");
            }
