<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 480" width="1060" height="480" style="background: #ffffff;">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .title { font-size: 22px; font-weight: 700; fill: #343a40; }
      .label { font-size: 15px; font-weight: 600; fill: #1e1e1e; }
      .sublabel { font-size: 12px; font-weight: 400; fill: #495057; }
      .decision-label { font-size: 13px; font-weight: 600; fill: #e67700; }
      .branch-label { font-size: 11px; fill: #868e96; font-weight: 600; }
    </style>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#495057"/>
    </marker>
    <marker id="ah-loop" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7048e8"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="530" y="35" text-anchor="middle" class="title">Agentic Loop</text>

  <!-- User Input -->
  <rect x="20" y="100" width="120" height="56" rx="12" fill="#dbe4ff" stroke="#4263eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="80" y="133" text-anchor="middle" class="label" fill="#364fc7">User Input</text>

  <!-- Arrow -->
  <line x1="140" y1="128" x2="184" y2="128" stroke="#495057" stroke-width="2" marker-end="url(#ah)"/>

  <!-- System Prompt + Context -->
  <rect x="190" y="90" width="150" height="76" rx="12" fill="#d3f9d8" stroke="#2b8a3e" stroke-width="2" filter="url(#shadow)"/>
  <text x="265" y="122" text-anchor="middle" class="label" fill="#2b8a3e">System Prompt</text>
  <text x="265" y="142" text-anchor="middle" class="sublabel">+ Context</text>

  <!-- Arrow -->
  <line x1="340" y1="128" x2="384" y2="128" stroke="#495057" stroke-width="2" marker-end="url(#ah)"/>

  <!-- LLM Call (highlighted as core) -->
  <rect x="390" y="96" width="130" height="64" rx="12" fill="#e5dbff" stroke="#7048e8" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="455" y="133" text-anchor="middle" class="label" fill="#6741d9">LLM Call</text>

  <!-- Arrow to decision -->
  <line x1="520" y1="128" x2="574" y2="128" stroke="#495057" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Decision diamond (using rotated rect technique) -->
  <g transform="translate(650, 128)">
    <rect x="-56" y="-40" width="112" height="80" rx="8" fill="#fff3bf" stroke="#e67700" stroke-width="2" transform="rotate(0)" filter="url(#shadow)"/>
    <path d="M -60 0 L 0 -44 L 60 0 L 0 44 Z" fill="#fff3bf" stroke="#e67700" stroke-width="2"/>
    <text x="0" y="-4" text-anchor="middle" class="decision-label">Tool call</text>
    <text x="0" y="14" text-anchor="middle" class="decision-label">or response?</text>
  </g>

  <!-- "Yes" branch down to Tool Selection -->
  <line x1="650" y1="172" x2="650" y2="236" stroke="#495057" stroke-width="2" marker-end="url(#ah)"/>
  <text x="664" y="208" class="branch-label">tool call</text>

  <!-- "No" branch right to Final Response -->
  <line x1="710" y1="128" x2="794" y2="128" stroke="#495057" stroke-width="2" marker-end="url(#ah)"/>
  <text x="748" y="120" class="branch-label">response</text>

  <!-- Tool Selection -->
  <rect x="585" y="242" width="130" height="56" rx="12" fill="#ffe8cc" stroke="#d9480f" stroke-width="2" filter="url(#shadow)"/>
  <text x="650" y="275" text-anchor="middle" class="label" fill="#d9480f">Tool Selection</text>

  <!-- Arrow left -->
  <line x1="585" y1="270" x2="531" y2="270" stroke="#495057" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Tool Execution -->
  <rect x="400" y="242" width="130" height="56" rx="12" fill="#ffe3e3" stroke="#e03131" stroke-width="2" filter="url(#shadow)"/>
  <text x="465" y="275" text-anchor="middle" class="label" fill="#c92a2a">Tool Execution</text>

  <!-- Arrow left -->
  <line x1="400" y1="270" x2="346" y2="270" stroke="#495057" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Memory Update -->
  <rect x="210" y="242" width="135" height="56" rx="12" fill="#dbe4ff" stroke="#4263eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="277" y="265" text-anchor="middle" class="label" fill="#364fc7">Memory</text>
  <text x="277" y="283" text-anchor="middle" class="label" fill="#364fc7">Update</text>

  <!-- Loop-back arrow from Memory to LLM Call -->
  <path d="M 277 242 Q 277 200 350 175 Q 390 163 390 128" fill="none" stroke="#7048e8" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ah-loop)"/>
  <text x="290" y="195" font-size="11" fill="#7048e8" font-weight="600" font-family="sans-serif">loop back</text>

  <!-- Final Response -->
  <rect x="800" y="100" width="130" height="56" rx="12" fill="#d3f9d8" stroke="#2b8a3e" stroke-width="2" filter="url(#shadow)"/>
  <text x="865" y="125" text-anchor="middle" class="label" fill="#2b8a3e">Final</text>
  <text x="865" y="143" text-anchor="middle" class="label" fill="#2b8a3e">Response</text>

  <!-- Arrow to User -->
  <line x1="930" y1="128" x2="964" y2="128" stroke="#495057" stroke-width="2" marker-end="url(#ah)"/>

  <!-- User (output) -->
  <rect x="970" y="100" width="70" height="56" rx="12" fill="#dbe4ff" stroke="#4263eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="1005" y="133" text-anchor="middle" class="label" fill="#364fc7">User</text>

  <!-- Loop visualization: dashed bounding box around the cycle -->
  <rect x="195" y="80" width="540" height="235" rx="16" fill="none" stroke="#7048e8" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.35"/>
  <text x="465" y="335" text-anchor="middle" font-size="12" fill="#7048e8" font-weight="600" font-family="sans-serif" opacity="0.6">agentic loop</text>
</svg>